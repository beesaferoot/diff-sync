limit_req_zone $binary_remote_addr zone=diffsync_limit:10m rate=10r/s;

server {
        server_name diffsync.beesaferoot.dev;
        listen 80;

        # WebSocket sync endpoint. proxy_params sets Host/X-Real-IP/X-Forwarded-*;
        # the Upgrade/Connection headers and long timeout are WS-specific extras.
        location /ws {
                proxy_pass http://127.0.0.1:8081;
                include proxy_params;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400s;   # keep long-lived sync sockets open (24h)
                proxy_send_timeout 86400s;
        }

        # Session API (/api/sessions*) — rate limited.
        location /api {
                proxy_pass http://127.0.0.1:8081;
                include proxy_params;
                limit_req zone=diffsync_limit burst=20 nodelay;
                limit_req_status 429;
        }

        # Static SPA + everything else — same origin.
        location / {
                proxy_pass http://127.0.0.1:8081;
                include proxy_params;
        }
}
